  btn.classList.add('active');
  if (name === 'groups'  && !window._groupsRendered)  { renderOutrights('groups-container',  GROUPS,  'world-cup-groups');  window._groupsRendered  = true; }
  if (name === 'futures' && !window._futuresRendered) { renderOutrights('futures-container', FUTURES, 'futures-outrights'); window._futuresRendered = true; }
}

const SHOW_LIMIT = 10;
var _cardCounter = 0;

function renderOutrights(containerId, data, pageSlug) {
  var wrap = document.getElementById(containerId);
  if (!data || !data.length) {
    wrap.innerHTML = '<div class="no-data">&#9888;&#65039; 目前無資料，請稍後再試或<br><a href="https://www.tab.co.nz/sports/soccer/world-cup/' + pageSlug + '" target="_blank">直接前往 TAB NZ &#8599;</a></div>';
    return;
  }
  var html = '';
  for (var ei = 0; ei < data.length; ei++) {
    var ev = data[ei];
    var evName = ev.event_name || '';
    var evUrl  = ev.url || ('https://www.tab.co.nz/sports/soccer/world-cup/' + pageSlug);
    var mkts   = ev.markets || [];
    var cards  = '';
    for (var mi = 0; mi < mkts.length; mi++) {
      var mkt  = mkts[mi];
      var ci   = _cardCounter++;
      var ents = mkt.entrants || [];
      var allO = ents.map(function(e){ return e.odds; }).filter(function(x){ return x; });
      var mn   = allO.length ? Math.min.apply(null, allO) : null;
      var mx   = allO.length ? Math.max.apply(null, allO) : null;
      var rows = '';
      for (var ri = 0; ri < ents.length; ri++) {
        var e = ents[ri];
        var cls = 'odds-nm';
        if (e.odds && mn !== null) cls = e.odds === mn ? 'odds-hi' : e.odds === mx ? 'odds-lo' : 'odds-nm';
        var oddsStr  = e.odds ? e.odds.toFixed(2) : '—';
        var extraCls = ri >= SHOW_LIMIT ? ' oextra ohidden' : '';
        rows += '<div class="oentrant-row' + extraCls + '" data-card="' + ci + '">' +
                '<span class="oentrant-name">' + e.name + '</span>' +
                '<span class="oentrant-odds ' + cls + '">' + oddsStr + '</span></div>';
      }
      var moreBtn = ents.length > SHOW_LIMIT
        ? '<button class="oshow-more" onclick="toggleMore(' + ci + ',this)">▼ 展開全部 (' + ents.length + ')</button>'
        : '';
      cards += '<div class="omarket-card">' +
               '<div class="omarket-title">' + mkt.name + '</div>' +
               rows + moreBtn + '</div>';
    }
    html += '<div class="oevent-section">' +
            '<div class="oevent-title"><span>' + evName + '</span>' +
            '<a class="omarket-bet" href="' + evUrl + '" target="_blank">TAB &#8599;</a></div>' +
            '<div class="omarkets-grid">' + cards + '</div></div>';
  }
  wrap.innerHTML = html;
}

function toggleMore(ci, btn) {
  var extras = document.querySelectorAll('.oextra[data-card="' + ci + '"]');
  var isOpen = btn.dataset.open === '1';
  for (var i = 0; i < extras.length; i++) {
    if (isOpen) extras[i].classList.add('ohidden');
    else extras[i].classList.remove('ohidden');
  }
  btn.dataset.open = isOpen ? '' : '1';
  btn.textContent  = isOpen ? '▼ 展開全部' : '▲ 收起';
}

function oddsClass(v, home, draw, away) {
  var vals = [home,draw,away].filter(function(x){ return x; });
  if (!vals.length) return 'odds-nm';
  var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals);
  return v===mn ? 'odds-fav' : v===mx ? 'odds-dog' : 'odds-mid';
}
function fmtDateLabel(nzDate) {
  var parts = nzDate.split(' ')[0].split('-');
  var y = +parts[0], m = +parts[1], d = +parts[2];
  var days = ['日','一','二','三','四','五','六'];
  return m + '/' + d + ' (週' + days[new Date(y, m-1, d).getDay()] + ')';
}

var totalMatches = MATCHES.length;
var allOdds = [];
for (var i = 0; i < MATCHES.length; i++) {
  var mm = MATCHES[i];
  if (mm.home_odds) allOdds.push(mm.home_odds);
  if (mm.draw_odds) allOdds.push(mm.draw_odds);
  if (mm.away_odds) allOdds.push(mm.away_odds);
}
var maxOdds = allOdds.length ? Math.max.apply(null, allOdds) : 0;
var minOdds = allOdds.length ? Math.min.apply(null, allOdds) : 0;
var maxMatch = MATCHES.find(function(m){ return m.home_odds===maxOdds || m.away_odds===maxOdds; });
var minMatch = MATCHES.find(function(m){ return m.home_odds===minOdds || m.away_odds===minOdds; });
var maxTeam = maxMatch ? (maxMatch.home_odds===maxOdds ? maxMatch.home : maxMatch.away) : '';
var minTeam = minMatch ? (minMatch.home_odds===minOdds ? minMatch.home : minMatch.away) : '';
document.getElementById('stats').innerHTML =
  '<div class="stat"><div class="stat-val">' + totalMatches + '</div><div class="stat-lbl">已開放賠率場數</div></div>' +
  '<div class="stat"><div class="stat-val" style="color:#10b981">' + (minOdds ? minOdds.toFixed(2) : '—') + '</div><div class="stat-lbl">最熱門 ' + minTeam + '</div></div>' +
  '<div class="stat"><div class="stat-val" style="color:#f87171">' + (maxOdds ? maxOdds.toFixed(2) : '—') + '</div><div class="stat-lbl">最大冷門 ' + maxTeam + '</div></div>';

var _allExpanded = false;
function expandAll() {
  _allExpanded = !_allExpanded;
  document.getElementById('expand-all-btn').textContent = _allExpanded ? '▲ 全部收起' : '▼ 全部展開';
  for (var i = 0; i < MATCHES.length; i++) {
    var det = document.getElementById('detail-' + i);
    var btn = document.getElementById('expand-' + i);
    if (!det || !btn) continue;
    if (_allExpanded) {
      det.classList.add('open');
      btn.classList.add('open');
      btn.textContent = '▲ 收起';
      if (!det.dataset.rendered) {
        det.querySelector('td').innerHTML = buildDetail(MATCHES[i], i);
        det.dataset.rendered = '1';
      }
    } else {
      det.classList.remove('open');
      btn.classList.remove('open');
      btn.textContent = '▼ 詳細';
    }
  }
}

function buildDetail(m, idx) {
  var groups = m.markets_by_group || [];
  if (!groups.length) return '<div style="padding:16px;color:#4b5563">無詳細市場資料</div>';
  var tabsHtml = '';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    tabsHtml += '<button class="gtab' + (i===0?' active':'') + '" onclick="switchTab(' + idx + ',' + i + ',this)">' + g.group_name + ' (' + g.markets.length + ')</button>';
  }
  var panelsHtml = '';
  for (var gi = 0; gi < groups.length; gi++) {
    var g = groups[gi];
    var cardsHtml = '';
    for (var mi2 = 0; mi2 < g.markets.length; mi2++) {
      var mkt = g.markets[mi2];
      var allO = mkt.entrants.map(function(e){ return e.odds; }).filter(function(x){ return x; });
      var mn2 = allO.length ? Math.min.apply(null, allO) : null;
      var mx2 = allO.length ? Math.max.apply(null, allO) : null;
      var entsHtml = '';
      for (var ei2 = 0; ei2 < mkt.entrants.length; ei2++) {
        var e = mkt.entrants[ei2];
        var cls = 'odds-nm';
        if (e.odds && mn2!==null) cls = e.odds===mn2?'odds-hi':e.odds===mx2?'odds-lo':'odds-nm';
        var oddsStr = e.odds ? e.odds.toFixed(2) : '—';
        entsHtml += '<div class="entrant-row"><span class="entrant-name">' + e.name + '</span><span class="entrant-odds ' + cls + '">' + oddsStr + '</span></div>';
      }
      cardsHtml += '<div class="market-card"><div class="market-title">' + mkt.name + '</div>' + entsHtml + '</div>';
    }
    panelsHtml += '<div class="group-panel' + (gi===0?' active':'') + '" id="gp-' + idx + '-' + gi + '"><div class="markets-grid">' + cardsHtml + '</div></div>';
  }
  return '<div class="detail-inner"><div class="group-tabs" id="gtabs-' + idx + '">' + tabsHtml + '</div>' + panelsHtml + '</div>';
}

function switchTab(idx, gi, btn) {
  document.querySelectorAll('#gtabs-' + idx + ' .gtab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('[id^="gp-' + idx + '-"]').forEach(function(p){ p.classList.remove('active'); });
  var panel = document.getElementById('gp-' + idx + '-' + gi);
  if (panel) panel.classList.add('active');
}

function toggleDetail(idx) {
  var det = document.getElementById('detail-' + idx);
  var btn = document.getElementById('expand-' + idx);
  if (!det) return;
  var isOpen = det.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.textContent = isOpen ? '▲ 收起' : '▼ 詳細';
  if (isOpen && !det.dataset.rendered) {
    det.querySelector('td').innerHTML = buildDetail(MATCHES[idx], idx);
    det.dataset.rendered = '1';
  }
}

var tbody = document.getElementById('tbody');
var lastDate = '';
for (var idx = 0; idx < MATCHES.length; idx++) {
  var m = MATCHES[idx];
  var dateKey = m.nz_time.slice(0,10);
  if (dateKey !== lastDate) {
    lastDate = dateKey;
    var sep = document.createElement('tr');
    sep.className = 'date-label'; sep.dataset.date = dateKey;
    sep.innerHTML = '<td colspan="11">📅 ' + fmtDateLabel(m.nz_time) + ' — NZ</td>';
    tbody.appendChild(sep);
  }
  var ho=m.home_odds, dr=m.draw_odds, aw=m.away_odds;
  var hc=ho?oddsClass(ho,ho,dr,aw):'', dc=dr?oddsClass(dr,ho,dr,aw):'', ac=aw?oddsClass(aw,ho,dr,aw):'';
  var qh=m.qualify_home_odds, qa=m.qualify_away_odds;
  var qhc=(qh&&qa)?(qh<qa?'odds-fav':'odds-dog'):'', qac=(qh&&qa)?(qa<qh?'odds-fav':'odds-dog'):'';
  var nzD=m.nz_time.slice(5,10).replace('-','/'), nzT=m.nz_time.slice(11,16);
  var twD=m.tw_time.slice(5,10).replace('-','/'), twT=m.tw_time.slice(11,16);
  var totalMkts = (m.markets_by_group||[]).reduce(function(s,g){ return s+g.markets.length; }, 0);
  var tr = document.createElement('tr');
  tr.className = 'match-row'; tr.dataset.date = dateKey; tr.dataset.idx = idx;
  tr.onclick = (function(i){ return function(){ toggleDetail(i); }; })(idx);
  tr.innerHTML =
    '<td><button class="expand-btn" id="expand-' + idx + '" onclick="event.stopPropagation();toggleDetail(' + idx + ')">▼ 詳細</button></td>' +
    '<td><div class="match-name">' + m.home + ' <span style="color:#4b5563">vs</span> ' + m.away + '</div></td>' +
    '<td><div class="time-nz">🇳🇿 ' + nzD + ' ' + nzT + '</div></td>' +
    '<td><div class="time-tw">🇹🇼 ' + twD + ' ' + twT + '</div></td>' +
    '<td class="odds-cell ' + hc + '">' + (ho ? ho.toFixed(2) : '<span class="no-odds">—</span>') + '</td>' +
    '<td class="odds-cell ' + dc + '">' + (dr ? dr.toFixed(2) : '<span class="no-odds">—</span>') + '</td>' +
    '<td class="odds-cell ' + ac + '">' + (aw ? aw.toFixed(2) : '<span class="no-odds">—</span>') + '</td>' +
    '<td class="odds-cell qual-col ' + qhc + '">' + (qh ? qh.toFixed(2) : '<span class="no-odds">—</span>') + '</td>' +
    '<td class="odds-cell qual-col ' + qac + '">' + (qa ? qa.toFixed(2) : '<span class="no-odds">—</span>') + '</td>' +
    '<td class="market-col" style="text-align:center;color:#6b7280;font-size:.78rem">' + (totalMkts||m.market_count||'—') + '</td>' +
    '<td><a class="bet-link" href="' + m.url + '" target="_blank" onclick="event.stopPropagation()">TAB &#8599;</a></td>';
  tbody.appendChild(tr);
  var det = document.createElement('tr');
  det.className = 'detail-row'; det.id = 'detail-' + idx;
  det.innerHTML = '<td colspan="11"></td>';
  tbody.appendChild(det);
}

</script>
</body>
</html>
