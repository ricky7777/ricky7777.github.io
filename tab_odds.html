function oddsClass(v, home, draw, away) {
  const vals = [home,draw,away].filter(x=>x);
  if (!vals.length) return 'odds-nm';
  const mn = Math.min(...vals), mx = Math.max(...vals);
  return v===mn ? 'odds-fav' : v===mx ? 'odds-dog' : 'odds-mid';
}
function fmtDateLabel(nzDate) {
  const [y,m,d] = nzDate.split(' ')[0].split('-');
  const days = ['日','一','二','三','四','五','六'];
  return `${m}/${d} (週${days[new Date(+y,+m-1,+d).getDay()]})`;
}

// Stats
const totalMatches = DATA.length;
const allOdds = DATA.flatMap(m=>[m.home_odds,m.draw_odds,m.away_odds]).filter(x=>x);
const maxOdds = Math.max(...allOdds), minOdds = Math.min(...allOdds);
const maxMatch = DATA.find(m=>[m.home_odds,m.away_odds].includes(maxOdds));
const minMatch = DATA.find(m=>[m.home_odds,m.away_odds].includes(minOdds));
const maxTeam = maxMatch?(maxMatch.home_odds===maxOdds?maxMatch.home:maxMatch.away):'';
const minTeam = minMatch?(minMatch.home_odds===minOdds?minMatch.home:minMatch.away):'';
document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-val">${totalMatches}</div><div class="stat-lbl">已開放賠率場數</div></div>
  <div class="stat"><div class="stat-val" style="color:#10b981">${minOdds.toFixed(2)}</div><div class="stat-lbl">最熱門 ${minTeam}</div></div>
  <div class="stat"><div class="stat-val" style="color:#f87171">${maxOdds.toFixed(2)}</div><div class="stat-lbl">最大冷門 ${maxTeam}</div></div>
`;

// Date filter
const dates = [...new Set(DATA.map(m=>m.nz_time.slice(0,10)))].sort();
let activeDate = 'all';
function renderFilters() {
  document.getElementById('filters').innerHTML = ['all',...dates].map(d=>{
    const lbl = d==='all'?'全部':fmtDateLabel(d+' 00:00');
    return `<button class="fbtn${d===activeDate?' active':''}" onclick="setDate('${d}')">${lbl}</button>`;
  }).join('');
}
function setDate(d) {
  activeDate = d;
  renderFilters();
  document.querySelectorAll('tr.match-row').forEach(tr=>{
    const hide = d!=='all' && tr.dataset.date!==d;
    tr.classList.toggle('hidden', hide);
    // also hide open detail if row hidden
    const det = document.getElementById('detail-'+tr.dataset.idx);
    if (det && hide) { det.classList.remove('open'); }
  });
  document.querySelectorAll('tr.date-label').forEach(tr=>{
    const hasVis = [...document.querySelectorAll(`tr.match-row[data-date="${tr.dataset.date}"]`)]
      .some(r=>!r.classList.contains('hidden'));
    tr.classList.toggle('hidden', !hasVis);
  });
}

      const entsHtml = mkt.entrants.map(e=>{
        let cls = 'odds-nm';
        if (e.odds && mn!==null) cls = e.odds===mn?'odds-hi':e.odds===mx?'odds-lo':'odds-nm';
        const oddsStr = e.odds ? e.odds.toFixed(2) : '—';
        return `<div class="entrant-row"><span class="entrant-name">${e.name}</span><span class="entrant-odds ${cls}">${oddsStr}</span></div>`;
      }).join('');
      return `<div class="market-card"><div class="market-title">${mkt.name}</div>${entsHtml}</div>`;
    }).join('');
    return `<div class="group-panel${gi===0?' active':''}" id="gp-${idx}-${gi}">`+
           `<div class="markets-grid">${cardsHtml}</div></div>`;
  }).join('');

  return `<div class="detail-inner">
    <div class="group-tabs" id="gtabs-${idx}">${tabsHtml}</div>
    ${panelsHtml}
  </div>`;
}

function switchTab(idx, gi, btn) {
  document.querySelectorAll(`#gtabs-${idx} .gtab`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[id^="gp-${idx}-"]`).forEach(p=>p.classList.remove('active'));
  const panel = document.getElementById(`gp-${idx}-${gi}`);
  if (panel) panel.classList.add('active');
}

function toggleDetail(idx) {
  const det = document.getElementById('detail-'+idx);
  const btn = document.getElementById('expand-'+idx);
  if (!det) return;
  const isOpen = det.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.textContent = isOpen ? '▲ 收起' : '▼ 詳細';
  // lazy-render detail content
  if (isOpen && !det.dataset.rendered) {
    det.querySelector('td').innerHTML = buildDetail(DATA[idx], idx);
    det.dataset.rendered = '1';
  }
}

// Render table
const tbody = document.getElementById('tbody');
let lastDate = '';
DATA.forEach((m,idx)=>{
  const dateKey = m.nz_time.slice(0,10);
  if (dateKey !== lastDate) {
    lastDate = dateKey;
    const sep = document.createElement('tr');
    sep.className = 'date-label'; sep.dataset.date = dateKey;
    sep.innerHTML = `<td colspan="9">📅 ${fmtDateLabel(m.nz_time)} — NZ</td>`;
    tbody.appendChild(sep);
  }

  const ho=m.home_odds, dr=m.draw_odds, aw=m.away_odds;
  const hc=ho?oddsClass(ho,ho,dr,aw):'', dc=dr?oddsClass(dr,ho,dr,aw):'', ac=aw?oddsClass(aw,ho,dr,aw):'';
  const nzD=m.nz_time.slice(5,10).replace('-','/'), nzT=m.nz_time.slice(11,16);
  const twD=m.tw_time.slice(5,10).replace('-','/'), twT=m.tw_time.slice(11,16);
  const totalMkts = (m.markets_by_group||[]).reduce((s,g)=>s+g.markets.length,0);

  const tr = document.createElement('tr');
  tr.className = 'match-row'; tr.dataset.date = dateKey; tr.dataset.idx = idx;
  tr.onclick = ()=>toggleDetail(idx);
  tr.innerHTML = `
    <td><button class="expand-btn" id="expand-${idx}" onclick="event.stopPropagation();toggleDetail(${idx})">▼ 詳細</button></td>
    <td><div class="match-name">${m.home} <span style="color:#4b5563">vs</span> ${m.away}</div></td>
    <td><div class="time-nz">🇳🇿 ${nzD} ${nzT}</div></td>
    <td><div class="time-tw">🇹🇼 ${twD} ${twT}</div></td>
    <td class="odds-cell ${hc}">${ho?ho.toFixed(2):'<span class="no-odds">—</span>'}</td>
    <td class="odds-cell ${dc}">${dr?dr.toFixed(2):'<span class="no-odds">—</span>'}</td>
    <td class="odds-cell ${ac}">${aw?aw.toFixed(2):'<span class="no-odds">—</span>'}</td>
    <td class="market-col" style="text-align:center;color:#6b7280;font-size:.78rem">${totalMkts||m.market_count||'—'}</td>
    <td><a class="bet-link" href="${m.url}" target="_blank" onclick="event.stopPropagation()">TAB ↗</a></td>
  `;
  tbody.appendChild(tr);

  // detail row (lazy content)
  const det = document.createElement('tr');
  det.className = 'detail-row'; det.id = 'detail-'+idx;
  det.innerHTML = '<td colspan="9"></td>';
  tbody.appendChild(det);
});

renderFilters();
</script>
</body>
</html>
