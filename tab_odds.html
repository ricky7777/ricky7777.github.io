function oddsClass(v, home, draw, away) {
  const mn = Math.min(...[home,draw,away].filter(x=>x));
  const mx = Math.max(...[home,draw,away].filter(x=>x));
  if (v === mn) return 'odds-fav';
  if (v === mx) return 'odds-dog';
  return 'odds-mid';
}

function fmtDate(nz) { return nz.slice(5,10).replace('-','/'); }
function fmtDateLabel(nz) {
  const [y,m,d] = nz.split(' ')[0].split('-');
  const days = ['日','一','二','三','四','五','六'];
  const dt = new Date(+y, +m-1, +d);
  return `${m}/${d} (週${days[dt.getDay()]})`;
}

// Stats
const totalMatches = DATA.length;
const allOdds = DATA.flatMap(m => [m.home_odds, m.draw_odds, m.away_odds]).filter(x=>x);
const maxOdds = Math.max(...allOdds);
const minOdds = Math.min(...allOdds);
const maxMatch = DATA.find(m => [m.home_odds,m.away_odds].includes(maxOdds));
const minMatch = DATA.find(m => [m.home_odds,m.away_odds].includes(minOdds));
const maxTeam = maxMatch ? (maxMatch.home_odds===maxOdds ? maxMatch.home : maxMatch.away) : '';
const minTeam = minMatch ? (minMatch.home_odds===minOdds ? minMatch.home : minMatch.away) : '';

document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-val">${totalMatches}</div><div class="stat-lbl">已開放賠率場數</div></div>
  <div class="stat"><div class="stat-val" style="color:#10b981">${minOdds.toFixed(2)}</div><div class="stat-lbl">最熱門 ${minTeam}</div></div>
  <div class="stat"><div class="stat-val" style="color:#f87171">${maxOdds.toFixed(2)}</div><div class="stat-lbl">最大冷門 ${maxTeam}</div></div>
`;

// Date filter buttons
const dates = [...new Set(DATA.map(m => m.nz_time.slice(0,10)))].sort();
let activeDate = 'all';

function renderFilters() {
  const f = document.getElementById('filters');
  f.innerHTML = ['all',...dates].map(d => {
    const lbl = d==='all' ? '全部' : fmtDateLabel(d+' 00:00');
    return `<button class="fbtn${d===activeDate?' active':''}" onclick="setDate('${d}')">${lbl}</button>`;
  }).join('');
}

function setDate(d) {
  activeDate = d;
  renderFilters();
  document.querySelectorAll('tr.match-row').forEach(tr => {
    tr.classList.toggle('hidden', d!=='all' && tr.dataset.date!==d);
  });
  document.querySelectorAll('tr.date-label').forEach(tr => {
    const next = tr.nextElementSibling;
    const hasVisible = [...document.querySelectorAll(`tr.match-row[data-date="${tr.dataset.date}"]`)]
      .some(r => !r.classList.contains('hidden'));
    tr.classList.toggle('hidden', !hasVisible);
  });
}

// Render table
const tbody = document.getElementById('tbody');
let lastDate = '';
DATA.forEach(m => {
  const dateKey = m.nz_time.slice(0,10);
  if (dateKey !== lastDate) {
    lastDate = dateKey;
    const sep = document.createElement('tr');
    sep.className = 'date-label';
    sep.dataset.date = dateKey;
    sep.innerHTML = `<td colspan="8">📅 ${fmtDateLabel(m.nz_time)} — NZ</td>`;
    tbody.appendChild(sep);
  }

  const tr = document.createElement('tr');
  tr.className = 'match-row';
  tr.dataset.date = dateKey;

  const ho = m.home_odds, dr = m.draw_odds, aw = m.away_odds;
  const hc = ho ? oddsClass(ho,ho,dr,aw) : '';
  const dc = dr ? oddsClass(dr,ho,dr,aw) : '';
  const ac = aw ? oddsClass(aw,ho,dr,aw) : '';

  const nzDate = m.nz_time.slice(5,10).replace('-','/');
  const nzTime = m.nz_time.slice(11,16);
  const twDate = m.tw_time.slice(5,10).replace('-','/');
  const twTime = m.tw_time.slice(11,16);

  tr.innerHTML = `
    <td>
      <div class="match-name">${m.home} <span style="color:#4b5563">vs</span> ${m.away}</div>
    </td>
    <td><div class="time-nz">🇳🇿 ${nzDate} ${nzTime}</div></td>
    <td><div class="time-tw">🇹🇼 ${twDate} ${twTime}</div></td>
    <td class="odds-cell ${hc}">${ho ? ho.toFixed(2) : '<span class="no-odds">—</span>'}</td>
    <td class="odds-cell ${dc}">${dr ? dr.toFixed(2) : '<span class="no-odds">—</span>'}</td>
    <td class="odds-cell ${ac}">${aw ? aw.toFixed(2) : '<span class="no-odds">—</span>'}</td>
    <td class="market-col" style="text-align:center;color:#6b7280;font-size:.78rem">${m.market_count}</td>
    <td><a class="bet-link" href="${m.url}" target="_blank">TAB ↗</a></td>
  `;
  tbody.appendChild(tr);
});

renderFilters();
</script>
